# Профиль prod: только переменные окружения, без паролей в репозитории.
# Render Blueprint: DB_URL / DB_USER / DB_PASSWORD из linked Postgres.
# Вручную на Render можно задать DATABASE_URL вместо DB_URL — см. fallback ниже.

spring.application.name=crm-system
spring.thymeleaf.cache=true

server.servlet.session.timeout=3d
server.servlet.session.cookie.max-age=3d
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax
server.forward-headers-strategy=framework

spring.datasource.url=${DB_URL:${DATABASE_URL}}
spring.datasource.username=${DB_USER:${PGUSER}}
spring.datasource.password=${DB_PASSWORD:${PGPASSWORD}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-form-post-size=-1
server.tomcat.threads.max=120
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

file.upload-dir=uploads
app.storage.type=${APP_STORAGE_TYPE:supabase}
supabase.storage.url=${SUPABASE_STORAGE_URL}
supabase.storage.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}
supabase.storage.bucket=${SUPABASE_BUCKET:crm-uploads}

spring.web.error.include-message=never
spring.web.error.include-stacktrace=never
spring.output.ansi.enabled=never

app.bootstrap.default-super-admin.enabled=${BOOTSTRAP_SUPER_ADMIN_ENABLED:false}
app.bootstrap.default-super-admin.name=${BOOTSTRAP_SUPER_ADMIN_NAME:}
app.bootstrap.default-super-admin.surname=${BOOTSTRAP_SUPER_ADMIN_SURNAME:}
app.bootstrap.default-super-admin.patronymic=${BOOTSTRAP_SUPER_ADMIN_PATRONYMIC:}
app.bootstrap.default-super-admin.login=${BOOTSTRAP_SUPER_ADMIN_LOGIN:}
app.bootstrap.default-super-admin.password=${BOOTSTRAP_SUPER_ADMIN_PASSWORD:}
app.bootstrap.default-super-admin.email=${BOOTSTRAP_SUPER_ADMIN_EMAIL:}
app.bootstrap.default-super-admin.phone=${BOOTSTRAP_SUPER_ADMIN_PHONE:}
