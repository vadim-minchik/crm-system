# Single production config
spring.application.name=crm-system
spring.thymeleaf.cache=true

server.servlet.session.timeout=3d
server.servlet.session.cookie.max-age=3d
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax
server.forward-headers-strategy=framework

# DB via environment variables (Render/Railway/etc.)
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-eu-west-2.pooler.supabase.com:5432/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${DB_USER:postgres.idoogxynhgasitjkfell}
spring.datasource.password=${DB_PASSWORD:lS2w5IqVli0GpoUS}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-form-post-size=-1
server.tomcat.threads.max=120
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

