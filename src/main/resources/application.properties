spring.application.name=crm-system
spring.thymeleaf.cache=false

# Сессия до 3 дней без активности; cookie с тем же сроком (можно закрыть браузер и не логиниться снова).
server.servlet.session.timeout=3d
server.servlet.session.cookie.max-age=3d
server.servlet.session.cookie.http-only=true

spring.datasource.url=jdbc:postgresql://localhost:5432/crm_system
spring.datasource.username=postgres
spring.datasource.password=Z1z2z3z4z
spring.datasource.driver-class-name=org.postgresql.Driver
# Параметры пула соединений для локального PostgreSQL
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000

spring.jpa.hibernate.ddl-auto=update
# После Hibernate выполнить schema.sql: безопасно добавить/заполнить version (NOT NULL + DEFAULT),
# иначе на непустых таблицах ALTER от Hibernate падает, а маппинг уже ждёт колонку.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

