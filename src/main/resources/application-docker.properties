# Профиль docker: сервис PostgreSQL из docker-compose (hostname db)
spring.datasource.url=jdbc:postgresql://db:5432/crm_system
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:crm_system_docker}

file.upload-dir=/app/uploads
app.storage.type=local

spring.jpa.show-sql=false
