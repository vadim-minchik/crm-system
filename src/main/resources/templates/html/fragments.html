<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<th:block th:fragment="viewport-meta">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<script>
(function(){try{var t=localStorage.getItem('crm-theme');var m=document.querySelector('meta[name="theme-color"]');if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.documentElement.setAttribute('data-bs-theme','dark');if(m)m.setAttribute('content','#08080a');}else{document.documentElement.setAttribute('data-bs-theme','light');if(m)m.setAttribute('content','#ffffff');}}catch(e){}})();
</script>
</th:block>
</head>
<body>

	<div th:fragment="sidebar(activeTab)" class="crm-shell">
		<div class="sidebar-backdrop" id="sidebarBackdrop" aria-hidden="true"></div>

		<aside class="sidebar" id="appSidebar" aria-label="Главное меню">

		<div class="logo">
			<h3><i class="bi bi-camera-reels-fill"></i> STUDIO.CRM</h3>
			<p>SYSTEM v3.0</p>
		</div>

		<nav class="sidebar-nav">
			<a href="/staff" class="nav-link" th:classappend="${activeTab == 'staff' ? 'active' : ''}">
				<i class="bi bi-person-badge"></i>
				<span>Штат сотрудников</span>
			</a>
			
			<a href="/clients" class="nav-link" th:classappend="${activeTab == 'clients' ? 'active' : ''}">
				<i class="bi bi-people"></i>
				<span>База клиентов</span>
			</a>
			
			<a href="/inventory" class="nav-link" th:classappend="${activeTab == 'inventory' ? 'active' : ''}">
				<i class="bi bi-box-seam"></i>
				<span>Склад техники</span>
			</a>

			<a href="/points" class="nav-link" th:classappend="${activeTab == 'points' ? 'active' : ''}"
			   th:if="${currentUserRole != null and (currentUserRole.name() == 'ADMIN' or currentUserRole.name() == 'SUPER_ADMIN')}">
				<i class="bi bi-geo-alt"></i>
				<span>Точки выдачи</span>
			</a>
			
			<a href="/rentals" class="nav-link" th:classappend="${activeTab == 'rentals' ? 'active' : ''}">
				<i class="bi bi-journal-text"></i>
				<span>Журнал прокатов</span>
			</a>

			<a href="/documents" class="nav-link" th:classappend="${activeTab == 'documents' ? 'active' : ''}"
			   th:if="${currentUserRole != null and (currentUserRole.name() == 'ADMIN' or currentUserRole.name() == 'SUPER_ADMIN')}">
				<i class="bi bi-folder2-open"></i>
				<span>Документы</span>
			</a>

			<a href="/statistics" class="nav-link" th:classappend="${activeTab == 'statistics' ? 'active' : ''}"
			   th:if="${currentUserRole != null and (currentUserRole.name() == 'ADMIN' or currentUserRole.name() == 'SUPER_ADMIN')}">
				<i class="bi bi-bar-chart-line"></i>
				<span>Статистика</span>
			</a>
		</nav>

		<div class="sidebar-footer">
			<div class="user-info">
				<div class="user-avatar">
					<i class="bi bi-person-fill"></i>
				</div>
				<div class="user-details">
					<strong th:text="${username}">User</strong>
					<small th:if="${currentUserRole == 'SUPER_ADMIN'}" class="role-super">SUPER ADMIN</small>
					<small th:if="${currentUserRole == 'ADMIN'}" class="role-admin">ADMIN</small>
					<small th:if="${currentUserRole == 'WORKER'}" class="role-worker">WORKER</small>
				</div>
			</div>
			<div class="theme-toggle-wrap mb-2">
				<button type="button" class="btn btn-sm w-100 theme-toggle-btn" id="crmThemeToggle" aria-pressed="false">
					<i class="bi bi-moon-stars-fill me-1 theme-ico-when-light" aria-hidden="true"></i>
					<i class="bi bi-sun-fill me-1 theme-ico-when-dark d-none" aria-hidden="true"></i>
					<span class="theme-toggle-text">Тёмная тема</span>
				</button>
			</div>
			<form th:action="@{/logout}" method="post" class="mt-3">
				<button type="submit" class="btn btn-danger w-100">
					<i class="bi bi-box-arrow-left"></i>
					<span>Завершить сеанс</span>
				</button>
			</form>
		</div>
		</aside>

		<header class="mobile-app-bar d-lg-none" role="banner">
			<button type="button" class="mobile-menu-btn" id="sidebarOpenBtn"
					aria-label="Открыть меню" aria-expanded="false" aria-controls="appSidebar">
				<i class="bi bi-list"></i>
			</button>
			<span class="mobile-app-title">STUDIO.CRM</span>
			<span class="mobile-app-bar-spacer" aria-hidden="true"></span>
		</header>

	<script th:inline="javascript">
		window.__CRM_DATA_REVISION__ = /*[[${dataRevision}]]*/ 0;
	</script>
	<script defer th:src="@{/js/crm-data-sync.js}"></script>
	<script defer th:src="@{/js/crm-mobile-nav.js}"></script>
	<script defer th:src="@{/js/crm-theme.js}"></script>
	</div>

</body>
</html>
